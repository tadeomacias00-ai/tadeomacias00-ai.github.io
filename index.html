<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feliz Cumpleaños Peña</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
text-align:center;
overflow:hidden;
}

/* SOBRE */

#sobre{
position:relative;
width:340px;
height:220px;
margin:150px auto;
cursor:pointer;
}

#cuerpo{
position:absolute;
width:100%;
height:100%;
background:#b91c1c;
border-radius:6px;
}

/* tapa triangular */

#tapa{
position:absolute;
width:0;
height:0;
border-left:170px solid transparent;
border-right:170px solid transparent;
border-top:110px solid #dc2626;
top:0;
left:0;
transform-origin:top;
transition:1s;
}

/* abrir tapa */

#abierto #tapa{
transform:rotateX(180deg);
}

/* contenido oculto */

#contenido{
opacity:0;
transform:translateY(40px);
transition:1s;
}

/* mostrar contenido */

#abierto #contenido{
opacity:1;
transform:translateY(0);
}

/* TARJETA */

.card{
width:90%;
max-width:500px;
margin:40px auto;
background:#111827;
border-radius:20px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

h1{
font-size:32px;
margin-bottom:10px;
}

p{
font-size:18px;
}

img{
display:block;
margin:20px auto;
width:100%;
border-radius:15px;
}

.footer{
margin-top:20px;
font-size:18px;
color:#facc15;
}

/* CONFETI */

.confetti{
position:fixed;
width:8px;
height:8px;
top:-10px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}

</style>

</head>

<body>

<div id="sobre" onclick="abrirCarta()">

<div id="cuerpo"></div>

<div id="tapa"></div>

<div id="contenido">

<div class="card">

<h1>🎉 Feliz Cumpleaños Peña 🎉</h1>

<p>
Pásalo bien Pablin 😎<br>
No se te olvide quién sigue siendo el papá de los pollitos 🐔🔥
</p>

<img src="IMG_20221201_101833.jpg">

<p class="footer">
🎂 Un año más cerca de jubilarte 🎂
</p>

</div>

</div>

</div>

<audio id="musica" loop>
<source src="happybirthday.mp3.m4a" type="audio/mp4">
</audio>

<script>

function abrirCarta(){

document.getElementById("sobre").id="abierto";

document.getElementById("musica").play();

crearConfeti();

}

/* confeti */

function crearConfeti(){

for(let i=0;i<150;i++){

let c=document.createElement("div");

c.classList.add("confetti");

c.style.left=Math.random()*100+"vw";

c.style.animationDuration=(Math.random()*3+2)+"s";

c.style.backgroundColor="hsl("+Math.random()*360+",100%,50%)";

document.body.appendChild(c);

}

}

</script>

</body>
</html>
